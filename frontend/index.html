
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal Department - Case Management SaaS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eff6ff',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 font-sans">
  <!-- TOKEN STORAGE -->
  <div id="token-store" data-token=""></div>

  <!-- LOGIN MODAL -->
  <div id="login-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4">
      <h1 class="text-3xl font-bold text-transparent bg-gradient-to-r from-primary-600 to-primary-700 bg-clip-text text-center mb-6">
        Legal Department
      </h1>
      <form id="login-form">
        <div class="mb-6">
          <label class="block text-sm font-medium mb-2">Email</label>
          <input type="email" id="login-email" value="admin@legal.com" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent" required>
        </div>
        <div class="mb-8">
          <label class="block text-sm font-medium mb-2">Password</label>
          <input type="password" id="login-password" value="password" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent" required>
        </div>
        <button type="submit" id="login-btn" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-3 px-4 rounded-xl shadow-lg transition-all">
          Sign In
        </button>
      </form>
      <p class="text-xs text-gray-500 text-center mt-4">admin@legal.com / password</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="min-h-screen hidden">
    <!-- HEADER -->
    <header class="bg-white shadow-sm border-b">
      <div class="max-w-7xl mx-auto px-4 py-4">
        <div class="flex justify-between items-center">
          <h1 class="text-2xl font-bold bg-gradient-to-r from-primary-600 to-primary-700 bg-clip-text">
            Legal Department
          </h1>
          <div class="flex items-center space-x-4">
            <span id="user-name" class="text-sm text-gray-700 font-medium"></span>
            <button id="logout-btn" class="p-2 hover:bg-gray-100 rounded-lg">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 2L3 9V7H1V17H11V15H3V13H10V11H1V19H11V17H13L10 20V18H17V8H15V10H7V12H9V14H1V2Z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- CONTENT -->
    <div class="flex max-w-7xl mx-auto">
      <!-- SIDEBAR -->
      <aside class="w-64 bg-white border-r shadow-sm h-screen overflow-auto">
        <nav class="p-6 space-y-1">
          <button onclick="showPage('dashboard')" class="w-full flex items-center space-x-3 p-3 rounded-xl text-gray-700 hover:bg-primary-50 hover:text-primary-600 transition-all">
            <div class="w-8 h-8 bg-primary-100 rounded-lg flex items-center justify-center">
              📊
            </div>
            <span class="font-medium">Dashboard</span>
          </button>
          <button onclick="showPage('clients')" class="w-full flex items-center space-x-3 p-3 rounded-xl text-gray-700 hover:bg-primary-50 hover:text-primary-600 transition-all">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
              <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span class="font-medium">Clients</span>
          </button>
          <button onclick="showPage('cases')" class="w-full flex items-center space-x-3 p-3 rounded-xl text-gray-700 hover:bg-primary-50 hover:text-primary-600 transition-all">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
              <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l2.414 2.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <span class="font-medium">Cases</span>
          </button>
          <button onclick="showPage('arrears')" class="w-full flex items-center space-x-3 p-3 rounded-xl text-gray-700 hover:bg-primary-50 hover:text-primary-600 transition-all">
            <svg class="w-5 h-5 text-orange-500" fill="currentColor" viewBox="0 0 20 20">
              <path d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 102 0V6a1 1 0 00-1-1z"/>
            </svg>
            <span class="font-medium">Arrears</span>
          </button>
        </nav>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="flex-1 p-8 overflow-auto">
        <!-- DASHBOARD (default) -->
        <div id="dashboard-page" class="page active">
          <h1 class="text-3xl font-bold mb-8">Dashboard</h1>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-lg">
              <div class="flex items-center">
                <div class="p-3 bg-blue-100 rounded-xl">
                  <svg class="w-6 h-6 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                  </svg>
                </div>
                <div class="ml-4">
                  <p class="text-sm font-medium text-gray-600">Active Clients</p>
                  <p id="clients-count" class="text-2xl font-bold text-gray-900">0</p>
                </div>
              </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-lg">
              <div class="flex items-center">
                <div class="p-3 bg-green-100 rounded-xl">
                  <svg class="w-6 h-6 text-green-600" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l2.414 2.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                  </svg>
                </div>
                <div class="ml-4">
                  <p class="text-sm font-medium text-gray-600">Open Cases</p>
                  <p id="cases-count" class="text-2xl font-bold text-gray-900">0</p>
                </div>
              </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-lg">
              <div class="flex items-center">
                <div class="p-3 bg-orange-100 rounded-xl">
                  <svg class="w-6 h-6 text-orange-600" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 102 0V6a1 1 0 00-1-1z"/>
                  </svg>
                </div>
                <div class="ml-4">
                  <p class="text-sm font-medium text-gray-600">Arrears Cases</p>
                  <p id="arrears-count" class="text-2xl font-bold text-gray-900">0</p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- CLIENTS PAGE -->
        <div id="clients-page" class="page hidden">
          <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">Clients</h1>
            <button onclick="showNewClientForm()" class="bg-primary-600 hover:bg-primary-700 text-white px-6 py-2 rounded-xl shadow-lg transition-all">
              + New Client
            </button>
          </div>
          <div id="clients-list" class="bg-white rounded-xl shadow-lg overflow-hidden">
            <table class="w-full">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-6 py-4 text-left text-sm font-medium text-gray-900">Name</th>
                  <th class="px-6 py-4 text-left text-sm font-medium text-gray-900">NRC</th>
                  <th class="px-6 py-4 text-left text-sm font-medium text-gray-900">Phone</th>
                  <th class="px-6 py-4 text-left text-sm font-medium text-gray-900">Actions</th>
                </tr>
              </thead>
              <tbody id="clients-table-body">
                <!-- Data loaded by JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- NEW CLIENT FORM -->
        <div id="new-client-form" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
          <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full mx-4 max-h-[90vh] overflow-y-auto">
            <h2 class="text-2xl font-bold mb-6">New Client</h2>
            <form id="client-form">
              <div class="mb-6">
                <label class="block text-sm font-medium mb-2">Full Name</label>
                <input type="text" id="client-name" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500" required>
              </div>
              <div class="mb-6">
                <label class="block text-sm font-medium mb-2">NRC Number</label>
                <input type="text" id="client-nrc" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500" required>
              </div>
              <div class="mb-6">
                <label class="block text-sm font-medium mb-2">Phone</label>
                <input type="tel" id="client-phone" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500">
              </div>
              <div class="mb-8">
                <label class="block text-sm font-medium mb-2">Email</label>
                <input type="email" id="client-email" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500">
              </div>
              <div class="flex space-x-3">
                <button type="submit" class="flex-1 bg-primary-600 hover:bg-primary-700 text-white font-medium py-3 px-4 rounded-xl shadow-lg transition-all">
                  Save Client
                </button>
                <button type="button" onclick="hideNewClientForm()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-900 font-medium py-3 px-4 rounded-xl shadow-lg transition-all">
                  Cancel
                </button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    // GLOBAL STATE
    let token = '';
    let user = null;
    let currentPage = 'dashboard';

    // API BASE
    const API_BASE = 'http://localhost:3001';

    // PAGE SHOW/HIDE
    function showPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
      document.getElementById(page + '-page').classList.remove('hidden');
      currentPage = page;
      if (page === 'clients') loadClients();
      if (page === 'dashboard') loadDashboardStats();
    }

    // LOAD TOKEN
    function loadToken() {
      token = document.getElementById('token-store').dataset.token || localStorage.getItem('token');
      if (token) {
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('login-modal').classList.add('hidden');
        loadUser();
        loadDashboardStats();
      } else {
        document.getElementById('login-modal').classList.remove('hidden');
        document.getElementById('app').classList.add('hidden');
      }
    }

    // LOGIN
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          token = data.token;
          user = data.user;
          localStorage.setItem('token', token);
          document.getElementById('token-store').dataset.token = token;
          document.getElementById('user-name').textContent = user.username;
          loadToken();
        } else {
          alert(data.error || 'Login failed');
        }
      } catch (err) {
        alert('Server error - check backend localhost:3001');
      }
    });

    // LOGOUT
    document.getElementById('logout-btn').onclick = () => {
      localStorage.removeItem('token');
      token = null;
      user = null;
      loadToken();
    };

    // LOAD USER
    async function loadUser() {
      try {
        const res = await fetch(`${API_BASE}/api/auth/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        user = await res.json();
        document.getElementById('user-name').textContent = user.username || user.role;
      } catch (err) {}
    }

    // LOAD CLIENTS
    async function loadClients() {
      try {
        const res = await fetch(`${API_BASE}/api/clients`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const clients = await res.json();
        const tbody = document.getElementById('clients-table-body');
        tbody.innerHTML = clients.map(client => `
          <tr class="border-t hover:bg-gray-50">
            <td class="px-6 py-4">${client.full_name}</td>
            <td class="px-6 py-4">${client.nrc_number}</td>
            <td class="px-6 py-4">${client.phone || '-'}</td>
            <td class="px-6 py-4">
              <button onclick="editClient('${client.id}')" class="text-blue-600 hover:text-blue-800 mr-3">Edit</button>
              <button onclick="deleteClient('${client.id}')" class="text-red-600 hover:text-red-800">Delete</button>
            </td>
          </tr>
        `).join('');
        document.getElementById('clients-count').textContent = clients.length;
      } catch (err) {
        console.error('Clients load error');
      }
    }

    // NEW CLIENT FORM
    function showNewClientForm() {
      document.getElementById('new-client-form').classList.remove('hidden');
    }

    function hideNewClientForm() {
      document.getElementById('new-client-form').classList.add('hidden');
      document.getElementById('client-form').reset();
    }

    // SAVE CLIENT
    document.getElementById('client-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const client = {
        full_name: document.getElementById('client-name').value,
        nrc_number: document.getElementById('client-nrc').value,
        phone: document.getElementById('client-phone').value,
        email: document.getElementById('client-email').value
      };

      try {
        await fetch(`${API_BASE}/api/clients`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(client)
        });
        hideNewClientForm();
        loadClients();
      } catch (err) {
        alert('Save failed');
      }
    });

    // DASHBOARD STATS
    async function loadDashboardStats() {
      try {
        const clientsRes = await fetch(`${API_BASE}/api/clients`, { headers: { 'Authorization': `Bearer ${token}` } });
        const clientsCount = (await clientsRes.json()).length;
        document.getElementById('clients-count').textContent = clientsCount;
      } catch (err) {}
    }

    // INIT
    lucide.createIcons();
    loadToken();
  </script>
</body>
</html>
